<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SplitTrip">
<meta name="theme-color" content="#e8ecf2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#131720" media="(prefers-color-scheme: dark)">
<title>SplitTrip — Trip Bill Splitter</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">
<script>(function(){const t=localStorage.getItem('splittrip.v1.theme');if(t)document.documentElement.dataset.theme=t;})();</script>
</head>
<body>
<div id="app">
  <header class="bar">
    <div class="bar-inner">
      <div>
        <h1 id="h-title">Add a Bill</h1>
        <div class="sub" id="h-sub">Split a new expense with your group</div>
      </div>
      <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"></button>
    </div>
  </header>
  <main id="view"></main>
</div>

<nav class="tabs" id="nav"></nav>

<div class="ocr-overlay" id="ocr">
  <div class="ocr-box">
    <div class="spin"></div>
    <div style="font-weight:600">Reading receipt…</div>
    <div class="muted small" id="ocr-status" style="margin-top:6px">Loading OCR engine</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file" accept="image/*" capture="environment" style="display:none">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
